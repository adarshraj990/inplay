services:
  - type: web
    name: indplay-backend-v3
    env: node
    plan: free
    rootDir: server
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        placeholder: "Paste your PostgreSQL connection string here"
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        value: https://indplay-backend-v3.onrender.com
      - key: BETTER_AUTH_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: AGORA_APP_ID
        sync: false
      - key: AGORA_APP_CERTIFICATE
        sync: false
      - key: SOCKET_CORS_ORIGIN
        value: "*"
      - key: CORS_ORIGINS
        value: "*"
