services:
  - type: web
    name: indplay-backend-v3
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: AGORA_APP_ID
        sync: false
      - key: AGORA_APP_CERTIFICATE
        sync: false
      - key: SOCKET_CORS_ORIGIN
        value: "*"
      - key: CORS_ORIGINS
        value: "*"
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_URL
        value: https://indplay-backend-v3-ghjr.onrender.com/api/auth
      - key: BETTER_AUTH_API_KEY
        sync: false
