services:
  - type: web
    name: indplay-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npx ts-node src/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SOCKET_CORS_ORIGIN
        value: "*"
      - key: CORS_ORIGINS
        value: "*"
