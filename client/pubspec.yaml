name: indplay_client
description: Indplay - High-Performance Social Gaming App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ─────────────────────────────────
  flutter_bloc: ^8.1.3
  bloc: ^8.1.3
  equatable: ^2.0.5
  provider: ^6.1.1

  # ── Networking ───────────────────────────────────────
  dio: ^5.4.0
  socket_io_client: ^2.0.3+1
  connectivity_plus: ^5.0.2

  # ── Navigation ───────────────────────────────────────
  go_router: ^13.1.0

  # ── Local Storage ────────────────────────────────────
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── Dependency Injection ─────────────────────────────
  get_it: ^7.6.7

  # ── Media ────────────────────────────────────────────
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  video_player: ^2.8.2

  # ── UI ───────────────────────────────────────────────
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  lottie: ^3.0.0
  fluttertoast: ^8.2.4
  flutter_slidable: ^3.0.1
  timeago: ^3.6.1
  intl: ^0.19.0

  # ── WebRTC / Voice ───────────────────────────────────

  # ── Permissions ──────────────────────────────────────
  permission_handler: ^11.3.0

  # ── Push Notifications ───────────────────────────────
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^17.0.0

  # ── Analytics ────────────────────────────────────────
  firebase_analytics: ^10.8.0

  # ── Utils ─────────────────────────────────────────────
  uuid: ^4.3.3
  dartz: ^0.10.1          # Functional error handling (Either<Left,Right>)
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  logger: ^2.1.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  hive_generator: any
  mocktail: ^1.0.2

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/sounds/
    - .env

